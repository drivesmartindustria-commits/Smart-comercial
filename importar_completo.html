function log(msg,tipo='info'){const el=document.getElementById('log');el.innerHTML+=`<div class="${tipo}">${msg}</div>`;el.scrollTop=el.scrollHeight;}

async function inserir(tabela, itens, nomeCampo){
  log(`\n📋 Importando ${itens.length} ${tabela}...`, 'info');
  let ok=0,err=0;
  for(const item of itens){
    try{
      const r=await fetch(SUPA_URL+'/rest/v1/'+tabela,{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(item)});
      if(r.ok){ok++;log('✓ '+item[nomeCampo],'ok');}
      else{const t=await r.text();err++;log('✗ '+item[nomeCampo]+': '+t,'err');}
    }catch(e){err++;log('✗ '+item[nomeCampo]+': '+e.message,'err');}
    await new Promise(r=>setTimeout(r,80));
  }
  log(`→ ${tabela}: ${ok} ok, ${err} erros`,'warn');
  return ok;
}

async function importar(){
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='Importando...';
  log('🚀 Iniciando importação completa...','info');
  
  await inserir('pedidos', DADOS.pedidos, 'cliente');
  await inserir('clientes', DADOS.clientes, 'nome');
  await inserir('produtos', DADOS.produtos, 'cod');
  await inserir('agenda', DADOS.agenda, 'titulo');
  await inserir('notas', DADOS.notas, 'texto');
  
  log('\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━','info');
  log('✅ Importação concluída! Acesse o sistema para verificar.','ok');
  btn.textContent='✅ Concluído!';
}
